{% extends 'home/dashboard_base.html' %}

{% block content %}
<div class="dashboard-section">
    <div class="section-header">
        <h3>Supprimer le projet</h3>
    </div>
    <div class="card form-card">
        <p>Voulez-vous vraiment supprimer le projet <strong>{{ project.title }}</strong> ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Supprimer définitivement</button>
            <a href="{% url 'dashboard_projects' %}" class="btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}

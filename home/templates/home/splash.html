{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Eng. H. Castro | Expertise & Recherche</title>
    <link rel="stylesheet" href="{% static 'home/style.css' %}">
    <link rel="icon" type="image/jpeg" href="{% static 'home/delamou.jpg' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020617; /* Deep Navy Background */
        }
        .splash-container {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(56, 189, 248, 0.3);
            border-radius: 50%;
            animation: float-particle 10s infinite linear;
        }
        @keyframes float-particle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .preloader-content {
            z-index: 10;
            text-align: center;
            color: white;
        }
        .academic-loader {
            font-size: 6rem;
            color: #38bdf8;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4));
        }
        .academic-loader i {
            animation: doctoral-pulse 2.5s infinite ease-in-out;
        }
        @keyframes doctoral-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }
        .dr-name {
            font-family: 'Georgia', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: block;
            opacity: 0;
            animation: fadeInLetter 1.5s forwards ease-out 0.5s;
        }
        @keyframes fadeInLetter {
            from { opacity: 0; transform: translateY(20px); letter-spacing: 15px; }
            to { opacity: 1; transform: translateY(0); letter-spacing: 8px; }
        }
        .loader-line {
            width: 300px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
        }
        .loader-line::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #38bdf8, transparent);
            animation: loading-bar 2s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }
        @keyframes loading-bar {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .loading-status {
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #94a3b8;
            font-size: 1.2rem;
            letter-spacing: 3px;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="particles" id="particles"></div>
        <div class="preloader-content">
            <div class="academic-loader">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="loader-text">
                <h1 class="dr-name">Dr. Eng. H. Castro</h1>
                <div class="loader-line"></div>
                <p class="loading-status">Établissement de la connexion sécurisée...</p>
            </div>
        </div>
    </div>

    <script>
        // Création de particules pour l'effet doctoral moderne
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random() * 0.5;
            container.appendChild(particle);
        }

        // Redirection après l'animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                const content = document.querySelector('.preloader-content');
                content.style.opacity = '0';
                content.style.transform = 'scale(0.95)';
                content.style.transition = 'all 1s cubic-bezier(0.4, 0, 0.2, 1)';
                
                setTimeout(() => {
                    window.location.href = "{% url 'home_portfolio' %}";
                }, 1000);
            }, 4000); 
        });
    </script>
</body>
</html>

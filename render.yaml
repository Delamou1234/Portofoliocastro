# ==============================================================================
# CONFIGURATION RENDER - DÉPLOIEMENT AUTOMATIQUE
# ==============================================================================
# Ce fichier configure le déploiement sur Render (https://render.com)

services:
  - type: web
    name: castro-portfolio
    env: python
    plan: free
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn Portofolio.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.10
      - key: DJANGO_SETTINGS_MODULE
        value: Portofolio.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true  # Génère automatiquement une clé sécurisée
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com,portofoliocastro.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://portofoliocastro.onrender.com,http://localhost:8000,http://127.0.0.1:8000
      - key: GEMINI_API_KEY
        sync: false  # À configurer manuellement dans le dashboard Render
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
